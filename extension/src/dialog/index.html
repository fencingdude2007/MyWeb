<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>Save to new collection — MyWeb</title>
    <style>
      :root {
        color-scheme: dark;
        --bg: #070708;
        --text: #f5f5f5;
        --muted: #a3a3a3;
        --glass: rgba(255, 255, 255, 0.04);
        --glass-border: rgba(255, 255, 255, 0.1);
        --accent: #818cf8;
        --grad: linear-gradient(100deg, #6366f1, #8b5cf6);
        --green: #34d399;
        --red: #f87171;
      }
      * {
        box-sizing: border-box;
      }
      body {
        margin: 0;
        padding: 20px;
        font-family: "Inter", ui-sans-serif, system-ui, -apple-system, "Segoe UI",
          Roboto, sans-serif;
        background: var(--bg);
        color: var(--text);
        position: relative;
        overflow: hidden;
        -webkit-font-smoothing: antialiased;
      }
      body::before {
        content: "";
        position: absolute;
        inset: 0;
        z-index: 0;
        pointer-events: none;
        background: radial-gradient(60% 50% at 20% -10%, rgba(99, 102, 241, 0.28), transparent 60%);
      }
      .wrap {
        position: relative;
        z-index: 1;
      }
      h1 {
        margin: 0 0 4px;
        font-size: 15px;
        font-weight: 600;
      }
      .url {
        font-size: 11px;
        color: var(--muted);
        margin: 0 0 14px;
        overflow: hidden;
        text-overflow: ellipsis;
        white-space: nowrap;
      }
      input {
        width: 100%;
        padding: 10px 12px;
        border: 1px solid var(--glass-border);
        border-radius: 11px;
        background: var(--glass);
        color: var(--text);
        font-size: 13px;
      }
      input:focus {
        outline: none;
        border-color: var(--accent);
      }
      .row {
        display: flex;
        gap: 8px;
        margin-top: 12px;
      }
      button {
        flex: 1;
        padding: 10px;
        border: none;
        border-radius: 11px;
        color: white;
        font-size: 13px;
        font-weight: 600;
        cursor: pointer;
      }
      .primary {
        background: var(--grad);
        box-shadow: 0 8px 20px -8px rgba(99, 102, 241, 0.6);
      }
      .primary:hover:not(:disabled) {
        filter: brightness(1.1);
      }
      .primary:disabled {
        opacity: 0.45;
        cursor: default;
      }
      .ghost {
        background: var(--glass);
        border: 1px solid var(--glass-border);
        color: var(--text);
        font-weight: 500;
      }
      .status {
        font-size: 12px;
        margin-top: 10px;
        min-height: 15px;
        color: var(--muted);
      }
      .status.ok {
        color: var(--green);
      }
      .status.err {
        color: var(--red);
      }
    </style>
  </head>
  <body>
    <div class="wrap">
      <h1>Save to a new collection</h1>
      <p id="url" class="url"></p>
      <input id="name" placeholder="Collection name…" autofocus />
      <div class="row">
        <button id="save" class="primary">Save</button>
        <button id="cancel" class="ghost">Cancel</button>
      </div>
      <div id="status" class="status"></div>
    </div>
    <script type="module" src="./dialog.ts"></script>
  </body>
</html>
