name: myweb

services:
  api:
    build: ./backend
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload
    ports:
      - "8000:8000"
    environment:
      DATABASE_URL: postgresql+asyncpg://myweb:myweb@postgres:5432/myweb
    volumes:
      - ./backend:/app
    depends_on:
      postgres:
        condition: service_healthy

  postgres:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_USER: myweb
      POSTGRES_PASSWORD: myweb
      POSTGRES_DB: myweb
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U myweb -d myweb"]
      interval: 5s
      timeout: 5s
      retries: 10

# Redis + a Celery `worker` service will be added in a later phase, once the
# app needs background job processing at scale. For now FastAPI does the
# page-processing work itself (see PLAN.md, Phase 2).

volumes:
  pgdata:
